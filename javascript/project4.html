        <h1> Welcome to the Nerdhaven DLC Pack</h1>
            <p> Welcome to bonus content, experiments, and hidden suprises</p>
        <h2>Create Your Nerd!</h2>
        <p> Lets build your custom Nerdy persona</p>
            <form id="characterForm">
                <label for="name">Gamer Tag</label>
                <input type="text" id="name" placeholder="e.g. I will know your name, Doctor!">
                <label for="class">Nerd-ID</label>
                <select id="class">
                    <option value="Logic Mage">Logic Mage</option>
                    <option value="Debug Knight">Debug Knight</option>
                    <option value="Pixel Bard">Pixel Bard</option>
                    <option value="Stack Sorcerer">Stack Sorcerer</option>
                    <option value="Lore Engineer">Lore Engineer</option>
                    <option value="Data Dazzler">Data Dazzler</option>
                </select>
                <label for="power">Nerdy Aura</label>
                <input type="text" id="power" placeholder="e.g. What is your Obscure Expertise">
                <button type="submit">Finish Them!</button>
            </form>
            <div id="output"></div>
            <script src="script.js"></script>
